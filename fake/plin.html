<!DOCTYPE html>

<style>

h2{

#creditos{

font-weight:600;

#nota{

margin-bottom:15px;

form{

flex-direction:column;
gap:15px;
}

label{
font-weight:500;
}

input,select{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:1rem;
}

button{
background:#00B14F;
color:white;
border:none;
border-radius:8px;
padding:12px;
font-size:1rem;
font-weight:500;
cursor:pointer;
}

button:hover{

}

#comprobante{

}

.header{

.logo{

.success{

.amount{

.details{

.label{
font-weight:600;

.green-badge{

background:#00B14F;
color:#fff;
font-size:0.75rem;
font-weight:600;
border-radius:6px;
padding:2px 8px;
}

.buttons{
display:flex;
flex-direction:column;
gap:12px;
margin-top:10px;
}

.primary{
background:#00B14F;
color:white;
border:none;
border-radius:8px;
padding:14px;
font-size:1rem;
cursor:pointer;
}

.secondary{
background:transparent;
color:#00B14F;
border:2px solid #00B14F;
border-radius:8px;
padding:14px;
font-size:1rem;
cursor:pointer;
}

.footer{
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #e5e5e5;
padding:12px 0 6px;
margin-top:25px;
font-size:0.8rem;
color:#666;
}

.footer div{
display:flex;
flex-direction:column;
align-items:center;
gap:3px;
}

.footer i{
font-size:1.3rem;
color:#00B14F;
}

</style>
</head>
<body>

<div class="container" id="formulario">

<h2>Generar Constancia</h2>

<div id="creditos">Cargando créditos...</div>
<div id="nota">⚠ Generar una constancia descuenta <b>2 créditos</b>.</div>

<form id="pagoForm">

<label>Nombre del destinatario:</label>
<input type="text" id="nombre" required>

<label>Número telefónico:</label>
<input type="tel" id="numero" required pattern="[0-9]{9}" maxlength="9">

<label>Destino:</label>
<select id="destino" required>
<option value="" disabled selected>Selecciona destino</option>
<option value="Yape">Yape</option>
<option value="Plin">Plin</option>
<option value="BCP">BCP</option>
<option value="Interbank">Interbank</option>
</select>

<label>Monto (S/):</label>
<input type="number" id="monto" required min="1" step="0.01">

<button type="submit">Generar constancia</button>

</form>
</div>

<div class="container" id="comprobante">

<div class="header">Constancia</div>

<div class="success">¡Pago exitoso!</div>

<div class="amount" id="montoTexto">S/ 0.00</div>

<div class="details">

<p><span class="label">Enviado a:</span><br>
<span id="nombreTexto"></span><br>
<span id="numeroTexto"></span></p>

<p><span class="label">Destino:</span> <span id="destinoTexto"></span></p>

<p><span class="label">Comisión:</span> <span class="green-badge">GRATIS</span></p>

<p><span class="label">Fecha y hora:</span> <span id="fechaHora"></span></p>

<p><span class="label">Código de operación:</span> <span id="codigoOperacion"></span></p>

</div>

<div class="buttons">
<button class="primary"><i class="fa-solid fa-paper-plane"></i> Enviar constancia</button>
<button class="secondary" onclick="volver()">Volver</button>
</div>

</div>

</body>
