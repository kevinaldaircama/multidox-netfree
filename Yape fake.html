<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generar comprobante</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="../3440119_ico.png" />
  <link rel="manifest" href="../manifest.json" />
  <meta name="theme-color" content="#0f2027" />
<style>

body{
font-family:Arial;
background:#650D89;
margin:0;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
color:black;
padding:25px;
border-radius:15px;
width:320px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#650D89;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
background:#650D89;
color:white;
font-size:16px;
border-radius:10px;
cursor:pointer;
}

#creditos{
margin-bottom:10px;
font-weight:bold;
text-align:center;
}

</style>
</head>
<body>

<div class="box">

<h2>Generar comprobante</h2>

<div id="creditos">Cargando créditos...</div>

<input id="nombre" placeholder="Nombre destino">

<input id="numero" placeholder="Número celular">

<input id="monto" placeholder="Monto">

<button onclick="generar()">Generar comprobante</button>

</div>


<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

// CONFIGURACIÓN
const firebaseConfig={
apiKey: "AIzaSyCRI8iTbn532EKaKOTKeZDjU6jkuue6HPM",
    authDomain: "fake-voucher-generator.firebaseapp.com",
    databaseURL: "https://fake-voucher-generator-default-rtdb.firebaseio.com",
    projectId: "fake-voucher-generator",
    storageBucket: "fake-voucher-generator.firebasestorage.app",
    messagingSenderId: "170906641361",
    appId: "1:170906641361:web:42ed312ef036feedc336f0",
    measurementId: "G-8XBVS1B6XT"
}

firebase.initializeApp(firebaseConfig)

const auth=firebase.auth()
const db=firebase.database()

let uid
let creditos=0


auth.onAuthStateChanged(user=>{

if(!user){
alert("Debes iniciar sesión")
return
}

uid=user.uid

db.ref(`usuarios/${uid}/comisionesTotales`).on("value",snap=>{

creditos=parseFloat(snap.val())||0

document.getElementById("creditos").innerText=
"Créditos disponibles: "+creditos

})

})


async function generar(){

const nombre=document.getElementById("nombre").value
const telefono=document.getElementById("numero").value
const monto=document.getElementById("monto").value


if(!nombre||!telefono||!monto){
alert("Completa todos los campos")
return
}


if(creditos<=0){
alert("No tienes créditos")
return
}


// descontar crédito
const nuevosCreditos=creditos-1

await db.ref(`usuarios/${uid}`).update({
comisionesTotales:nuevosCreditos
})


// redirigir al comprobante
window.location.href=
`fake/yape.html?nombre=${encodeURIComponent(nombre)}&telefono=${telefono}&monto=${monto}`

}

</script>

</body>
</html>
